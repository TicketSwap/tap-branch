send_anonymous_usage_stats: true
project_id: "tap-branch"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-branch"
    namespace: "tap_branch"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: branch_key
      kind: string
      label: Branch Key
      description: The Branch app key (public).

    - name: branch_secret
      kind: string
      label: Branch Secret
      description: The Branch app secret.
      sensitive: true

    - name: start_date
      kind: string
      label: Start Date
      description: "Earliest export date to sync (YYYY-MM-DD). Defaults to 30 days ago."

    settings_group_validation:
    - [branch_key, branch_secret]

    config:
      start_date: "2026-04-01T00:00:00Z"
    
    select:
      - "eo_install.*"

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
